<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="GTM Venture Advisors — Capital Markets & Financial Advisory for high-growth international founders. A TBDC Company." />
    <meta property="og:title" content="GTM Venture Advisors — Capital Markets & Financial Advisory" />
    <meta property="og:description" content="Scaling International Founders into North American Institutional Capital. A TBDC Company." />
    <meta property="og:type" content="website" />
    <title>GTM Venture Advisors — Capital Markets & Financial Advisory | A TBDC Company</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener(
        "submit",
        function (event) {
          var form = event.target;
          if (!(form instanceof HTMLFormElement) || !form.closest("#contact")) {
            return;
          }

          event.preventDefault();
          event.stopImmediatePropagation();

          var name = form.querySelector('input[type="text"]');
          var email = form.querySelector('input[type="email"]');
          var message = form.querySelector("textarea");
          var endpoint = "https://formsubmit.co/info@gtmventureadvisors.com";
          var submission = document.createElement("form");
          var fields = {
            name: name ? name.value : "",
            email: email ? email.value : "",
            message: message ? message.value : "",
            _subject: "New GTM Venture Advisors website inquiry",
            _template: "table",
            _captcha: "false",
            _next: window.location.href.split("#")[0] + "#contact",
          };

          submission.method = "POST";
          submission.action = endpoint;
          submission.style.display = "none";

          Object.keys(fields).forEach(function (fieldName) {
            var input = document.createElement("input");
            input.type = "hidden";
            input.name = fieldName;
            input.value = fields[fieldName];
            submission.appendChild(input);
          });

          document.body.appendChild(submission);
          submission.submit();
        },
        true,
      );
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
